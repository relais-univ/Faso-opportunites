<!DOCTYPE html>
<html>
<head>
    <title>Faso opportunités</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f0f2f5;
            padding-bottom: 30px;
        }
        .bandeau-vert {
            background: #006400;
            color: white;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: center;
        }
        .bandeau-vert h1 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        .partage-boutons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-partage {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 8px 0;
            border-radius: 20px;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }
        .btn-partage:active {
            background: white;
            color: #006400;
        }
        #statsContainer {
            display: none;
        }
        .stats {
            background: white;
            padding: 15px;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #ddd;
        }
        .stat {
            text-align: center;
        }
        .chiffre {
            font-size: 24px;
            font-weight: bold;
            color: #006400;
        }
        .label {
            font-size: 13px;
            color: #666;
        }
        .search-container {
            padding: 15px;
            background: white;
        }
        .search-box {
            background: #f0f2f5;
            border-radius: 50px;
            padding: 8px 15px;
            display: flex;
            border: 1px solid #ddd;
        }
        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            padding: 10px 5px;
        }
        .search-box button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #006400;
        }
        .btn-admin-principal {
            background: #ff6b00;
            color: white;
            border: none;
            padding: 15px;
            margin: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            width: calc(100% - 30px);
            cursor: pointer;
            display: none;
        }
        .flux {
            padding: 15px;
        }
        .carte {
            background: white;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .carte-image {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
        }
        .carte-contenu {
            padding: 15px;
        }
        .categorie-badge {
            background: #e8f5e9;
            color: #006400;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .carte-titre {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .carte-description {
            color: #666;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .lien-source {
            color: #006400;
            text-decoration: none;
            display: block;
            margin: 8px 0;
        }
        .carte-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #ddd;
            padding-top: 12px;
        }
        .btn-partager-offre {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        .admin-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            border-top: 1px dashed #ccc;
            padding-top: 10px;
        }
        .btn-modifier, .btn-supprimer {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-modifier {
            background: #ff6b00;
            color: white;
        }
        .btn-supprimer {
            background: #ff4444;
            color: white;
        }
        .formulaire-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        .formulaire-container {
            background: white;
            max-width: 500px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 15px;
        }
        .formulaire-container h2 {
            color: #006400;
            margin-bottom: 20px;
        }
        .formulaire-container input,
        .formulaire-container select,
        .formulaire-container textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .zone-upload {
            border: 2px dashed #ff6b00;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            background: #fff9f0;
            margin: 15px 0;
        }
        #mediaPreview img {
            max-width: 100%;
            max-height: 200px;
            margin: 10px 0;
        }
        .btn-publier {
            background: #006400;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }
        .btn-annuler {
            background: #ccc;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 8px;
            cursor: pointer;
        }
        .menu-icon {
            position: fixed;
            top: 15px;
            right: 15px;
            font-size: 24px;
            color: white;
            cursor: pointer;
            z-index: 101;
            background: rgba(0,0,0,0.2);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
        }
        .menu-lateral {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: white;
            transition: 0.3s;
            z-index: 300;
            padding: 20px;
        }
        .menu-lateral.ouvert {
            right: 0;
        }
        .menu-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .no-result {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="menu-icon" onclick="ouvrirMenu()">☰</div>
    
    <div class="bandeau-vert">
        <h1>🇧🇫 FASO OPPORTUNITÉS</h1>
        <div class="partage-boutons">
            <div class="btn-partage" onclick="partager('whatsapp')">📱 WhatsApp</div>
            <div class="btn-partage" onclick="partager('telegram')">✈️ Telegram</div>
            <div class="btn-partage" onclick="partager('copier')">🔗 Copier</div>
        </div>
    </div>
    
    <div id="statsContainer">
        <div class="stats">
            <div class="stat">
                <div class="chiffre" id="abonnes">0</div>
                <div class="label">Abonnés</div>
            </div>
        </div>
    </div>
    
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="recherche" placeholder="Rechercher...">
            <button onclick="rechercher()">🔍</button>
        </div>
    </div>
    
    <button class="btn-admin-principal" id="btnAdmin" onclick="ouvrirFormulaire()">
        ➕ Publier une opportunité
    </button>
    
    <div class="flux" id="flux"></div>
    
    <div class="formulaire-overlay" id="formulaire">
        <div class="formulaire-container">
            <h2 id="formulaireTitre">📝 Publier une opportunité</h2>
            <input type="hidden" id="indexModification" value="-1">
            
            <div class="zone-upload" onclick="document.getElementById('uploadImage').click()">
                📸 Image (optionnel)
            </div>
            <input type="file" id="uploadImage" accept="image/*" style="display:none;" onchange="previewMedia(event)">
            <div id="mediaPreview"></div>
            
            <input type="text" id="titre" placeholder="Titre (optionnel)">
            <textarea id="description" placeholder="Description (optionnel)" rows="3"></textarea>
            
            <select id="categorie">
                <option value="">Catégorie</option>
                <option value="recrutement">Recrutement</option>
                <option value="bourse">Bourse</option>
                <option value="concours">Concours</option>
                <option value="stage">Stage</option>
            </select>
            
            <input type="url" id="lienSource" placeholder="Lien source (optionnel)">
            <input type="date" id="dateLimite">
            
            <button class="btn-publier" onclick="publier()">✅ Publier</button>
            <button class="btn-annuler" onclick="fermerFormulaire()">❌ Annuler</button>
        </div>
    </div>
    
    <div class="menu-overlay" onclick="fermerMenu()"></div>
    <div class="menu-lateral" id="menu">
        <div class="menu-item" onclick="changerCompte()">🔄 Changer compte</div>
        <div class="menu-item" onclick="ouvrirContact()">📞 Contact</div>
    </div>
    
    <script>
        // ============================================
        // MODE ADMIN FORCÉ
        // ============================================
        let estAdmin = true;
        
        // ============================================
        // AFFICHAGE ADMIN
        // ============================================
        if (estAdmin) {
            document.getElementById('btnAdmin').style.display = 'block';
            document.getElementById('statsContainer').style.display = 'block';
        }
        
        // ============================================
        // COMPTEUR ABONNÉS
        // ============================================
        let abonnes = parseInt(localStorage.getItem('abonnes')) || 0;
        if (!localStorage.getItem('dejaCompte')) {
            abonnes++;
            localStorage.setItem('abonnes', abonnes);
            localStorage.setItem('dejaCompte', 'true');
        }
        document.getElementById('abonnes').textContent = abonnes;
        
        // ============================================
        // VARIABLES
        // ============================================
        let imageEnMemoire = null;
        let indexModification = -1;
        
        // ============================================
        // PARTAGE
        // ============================================
        function partager(type) {
            let texte = "🇧🇫 Faso opportunités - Découvre les opportunités !";
            let url = window.location.href;
            if (type === 'whatsapp') {
                window.open('https://wa.me/?text=' + encodeURIComponent(texte + ' ' + url));
            } else if (type === 'telegram') {
                window.open('https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(texte));
            } else if (type === 'copier') {
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(url).then(() => alert('✅ Copié !'));
                }
            }
        }
        
        function partagerOffre(titre, desc, date) {
            let txt = `*${titre || 'Offre'}*\n${desc || ''}\n📅 ${date || ''}`;
            window.open('https://wa.me/?text=' + encodeURIComponent(txt));
        }
        
        // ============================================
        // RECHERCHE
        // ============================================
        function rechercher() {
            let recherche = document.getElementById('recherche').value.toLowerCase();
            afficherOffres(recherche);
        }
        
        // ============================================
        // AFFICHAGE DES OFFRES
        // ============================================
        function afficherOffres(recherche = '') {
            let offres = JSON.parse(localStorage.getItem('opportunites') || '[]');
            
            if (recherche) {
                offres = offres.filter(o => 
                    (o.titre && o.titre.toLowerCase().includes(recherche)) ||
                    (o.description && o.description.toLowerCase().includes(recherche))
                );
            }
            
            offres.sort((a, b) => new Date(b.datePublication||0) - new Date(a.datePublication||0));
            
            let html = '';
            offres.forEach((offre, idx) => {
                let vraiIndex = offres.length - 1 - idx;
                html += '<div class="carte">';
                if (offre.image) html += `<img src="${offre.image}" class="carte-image">`;
                html += '<div class="carte-contenu">';
                if (offre.categorie) html += `<span class="categorie-badge">${offre.categorie}</span>`;
                if (offre.titre) html += `<div class="carte-titre">${offre.titre}</div>`;
                if (offre.description) html += `<div class="carte-description">${offre.description}</div>`;
                if (offre.lienSource) html += `<a href="${offre.lienSource}" target="_blank" class="lien-source">🔗 Source</a>`;
                html += '<div class="carte-footer">';
                html += `<span>📅 ${offre.date || ''}</span>`;
                html += `<button class="btn-partager-offre" onclick="partagerOffre('${offre.titre || ''}', '${offre.description || ''}', '${offre.date || ''}')">📲</button>`;
                html += '</div>';
                
                if (estAdmin) {
                    html += `<div class="admin-actions">`;
                    html += `<button class="btn-modifier" onclick="modifier(${vraiIndex})">✏️ Modifier</button>`;
                    html += `<button class="btn-supprimer" onclick="supprimer(${vraiIndex})">🗑️ Supprimer</button>`;
                    html += `</div>`;
                }
                
                html += '</div></div>';
            });
            document.getElementById('flux').innerHTML = html || '<div class="no-result">Aucune offre</div>';
        }
        
        // ============================================
        // ADMIN : MODIFIER
        // ============================================
        function modifier(index) {
            if (!estAdmin) return;
            let offres = JSON.parse(localStorage.getItem('opportunites') || '[]');
            let offre = offres[index];
            indexModification = index;
            document.getElementById('titre').value = offre.titre || '';
            document.getElementById('description').value = offre.description || '';
            document.getElementById('categorie').value = offre.categorie || '';
            document.getElementById('dateLimite').value = offre.date || '';
            document.getElementById('lienSource').value = offre.lienSource || '';
            if (offre.image) {
                document.getElementById('mediaPreview').innerHTML = `<img src="${offre.image}" style="max-width:100%;max-height:200px;">`;
                imageEnMemoire = offre.image;
            }
            ouvrirFormulaire();
        }
        
        // ============================================
        // ADMIN : SUPPRIMER
        // ============================================
        function supprimer(index) {
            if (!estAdmin) return;
            if (confirm('Supprimer ?')) {
                let offres = JSON.parse(localStorage.getItem('opportunites') || '[]');
                offres.splice(index, 1);
                localStorage.setItem('opportunites', JSON.stringify(offres));
                afficherOffres();
            }
        }
        
        // ============================================
        // FORMULAIRE : OUVRIR/FERMER
        // ============================================
        function ouvrirFormulaire() {
            document.getElementById('formulaire').style.display = 'block';
        }
        
        function fermerFormulaire() {
            document.getElementById('formulaire').style.display = 'none';
            document.getElementById('titre').value = '';
            document.getElementById('description').value = '';
            document.getElementById('lienSource').value = '';
            document.getElementById('dateLimite').value = '';
            document.getElementById('mediaPreview').innerHTML = '';
            document.getElementById('categorie').value = '';
            imageEnMemoire = null;
            indexModification = -1;
        }
        
        // ============================================
        // PREVISUALISATION IMAGE
        // ============================================
        function previewMedia(event) {
            let file = event.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('mediaPreview').innerHTML = `<img src="${e.target.result}" style="max-width:100%;max-height:200px;">`;
                    imageEnMemoire = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }
        
        // ============================================
        // PUBLIER UNE OFFRE (NEUVE OU MODIFIÉE)
        // ============================================
        function publier() {
            let titre = document.getElementById('titre').value.trim();
            let description = document.getElementById('description').value.trim();
            let categorie = document.getElementById('categorie').value;
            let date = document.getElementById('dateLimite').value;
            let lienSource = document.getElementById('lienSource').value.trim();
            
            // Vérifier qu'au moins un champ est rempli
            if (!titre && !description && !categorie && !date && !lienSource && !imageEnMemoire) {
                alert('Ajoute au moins une image ou du texte !');
                return;
            }
            
            // Créer l'objet offre
            let offre = {
                datePublication: new Date().toISOString()
            };
            
            if (titre) offre.titre = titre;
            i
