<!DOCTYPE html>
<html>
<head>
    <title>Faso opportunités - Connexion</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .banderole {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1523803326055-6a5bf54d2b0d?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .banderole h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .banderole p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .formulaire {
            background: white;
            padding: 25px;
            border-radius: 20px;
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        h2 {
            color: #006400;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        input, button {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border: 2px solid #e4e6eb;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }
        
        input:focus {
            border-color: #006400;
            outline: none;
        }
        
        button {
            background: #006400;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .case {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            justify-content: center;
        }
        
        .case label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #333;
        }
        
        .utilisateur-reconnu {
            background: #e8f5e9;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .utilisateur-reconnu h3 {
            color: #006400;
            margin-bottom: 10px;
        }
        
        .bouton-changer {
            background: #ff6b00;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            width: auto;
            display: inline-block;
        }
        
        /* Boîte de dialogue code admin */
        #dialogCode {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .code-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 350px;
            width: 100%;
            text-align: center;
        }
        
        .code-box h3 {
            color: #006400;
            margin-bottom: 15px;
            font-size: 22px;
        }
        
        .code-box p {
            color: #666;
            margin-bottom: 20px;
        }
        
        .code-box input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #006400;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 3px;
        }
        
        .code-box button {
            background: #006400;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            margin: 5px 0;
            cursor: pointer;
        }
        
        .code-box .btn-annuler {
            background: #ccc;
        }
        
        .createur-cache {
            display: none;
        }
    </style>
</head>
<body>
    <div class="createur-cache">Créé par KONSÉGUÉ RÉLWENDÉ CHRISTIAN</div>
    
    <div class="banderole">
        <h1>🇧🇫 FASO OPPORTUNITÉS</h1>
        <p>Ensemble, saisissons les opportunités du Burkina</p>
    </div>
    
    <div class="formulaire" id="formulaireConnexion">
        <!-- Le contenu change dynamiquement -->
    </div>
    
    <!-- Boîte de dialogue pour code admin -->
    <div id="dialogCode">
        <div class="code-box">
            <h3>🔐 Code Administrateur</h3>
            <p>KONSÉGUÉ Christian, entre ton code secret :</p>
            <input type="password" id="codeAdmin" placeholder="Code secret" autocomplete="off">
            <button onclick="validerCode()">Valider</button>
            <button class="btn-annuler" onclick="annulerCode()">Annuler</button>
        </div>
    </div>
    
    <script>
        // ============================================
        // 1. VÉRIFIER SI L'UTILISATEUR EST DÉJÀ CONNECTÉ
        // ============================================
        let nom = localStorage.getItem('nomUtilisateur');
        let prenoms = localStorage.getItem('prenomsUtilisateur');
        
        function afficherFormulaire() {
            let formulaire = document.getElementById('formulaireConnexion');
            
            if (nom && prenoms) {
                // UTILISATEUR CONNU
                formulaire.innerHTML = `
                    <div class="utilisateur-reconnu">
                        <h3>👋 Bonjour ${prenoms} ${nom} !</h3>
                        <p>Content de te revoir sur Faso opportunités 🇧🇫</p>
                        <button class="bouton-changer" onclick="changerUtilisateur()">
                            🔄 Ce n'est pas moi ? Changer de compte
                        </button>
                    </div>
                    <button onclick="verifierConnexion()">
                        Accéder aux opportunités →
                    </button>
                `;
            } else {
                // NOUVEL UTILISATEUR
                formulaire.innerHTML = `
                    <h2>Bienvenue !</h2>
                    <p style="text-align:center; color:#666; margin-bottom:20px;">Remplis ce formulaire pour entrer</p>
                    
                    <input type="text" id="nom" placeholder="Ton nom" required>
                    <input type="text" id="prenoms" placeholder="Tes prénoms" required>
                    <input type="email" id="email" placeholder="Ton adresse email" required>
                    <input type="tel" id="telephone" placeholder="Ton numéro de téléphone" required>
                    
                    <div class="case">
                        <label>
                            <input type="radio" name="statut" value="eleve" checked> Élève
                        </label>
                        <label>
                            <input type="radio" name="statut" value="etudiant"> Étudiant
                        </label>
                    </div>
                    
                    <button onclick="inscrireUtilisateur()">
                        Entrer dans Faso opportunités
                    </button>
                `;
            }
        }
        
        // ============================================
        // 2. INSCRIPTION NOUVEL UTILISATEUR
        // ============================================
        function inscrireUtilisateur() {
            let nom = document.getElementById('nom').value.trim();
            let prenoms = document.getElementById('prenoms').value.trim();
            let email = document.getElementById('email').value.trim();
            let telephone = document.getElementById('telephone').value.trim();
            
            if (!nom || !prenoms || !email || !telephone) {
                alert("❌ Remplis tous les champs !");
                return;
            }
            
            // Sauvegarder les infos
            localStorage.setItem('nomUtilisateur', nom);
            localStorage.setItem('prenomsUtilisateur', prenoms);
            localStorage.setItem('emailUtilisateur', email);
            localStorage.setItem('telephoneUtilisateur', telephone);
            
            // Vérifier si c'est l'admin
            verifierSiAdmin(nom, prenoms);
        }
        
        // ============================================
        // 3. UTILISATEUR CONNU
        // ============================================
        function verifierConnexion() {
            let nom = localStorage.getItem('nomUtilisateur');
            let prenoms = localStorage.getItem('prenomsUtilisateur');
            verifierSiAdmin(nom, prenoms);
        }
        
        function changerUtilisateur() {
            localStorage.removeItem('nomUtilisateur');
            localStorage.removeItem('prenomsUtilisateur');
            localStorage.removeItem('emailUtilisateur');
            localStorage.removeItem('telephoneUtilisateur');
            localStorage.removeItem('estAdmin');
            window.location.reload();
        }
        
        // ============================================
        // 4. VÉRIFICATION ADMIN (KONSÉGUÉ CHRISTIAN)
        // ============================================
        function verifierSiAdmin(nom, prenoms) {
            // Nettoyer et mettre en majuscules
            let nomClean = (nom || '').trim().toUpperCase();
            let prenomClean = (prenoms || '').trim().toUpperCase();
            
            // Vérifier si c'est KONSÉGUÉ Christian (dans n'importe quel ordre)
            let estAdmin = (nomClean === "KONSÉGUÉ" && prenomClean === "CHRISTIAN") ||
                          (nomClean === "CHRISTIAN" && prenomClean === "KONSÉGUÉ") ||
                          (nomClean.includes("KONSÉGUÉ") && prenomClean.includes("CHRISTIAN")) ||
                          (nomClean.includes("CHRISTIAN") && prenomClean.includes("KONSÉGUÉ"));
            
            if (estAdmin) {
                // C'est l'admin → demander le code
                document.getElementById('dialogCode').style.display = 'flex';
            } else {
                // Visiteur normal → aller à l'accueil
                localStorage.setItem('estAdmin', 'false');
                window.location.href = 'accueil.html';
            }
        }
        
        // ============================================
        // 5. GESTION DU CODE ADMIN
        // ============================================
        const CODE_ADMIN = "FASO2026";
        
        function validerCode() {
            let code = document.getElementById('codeAdmin').value.trim();
            
            if (code === CODE_ADMIN) {
                localStorage.setItem('estAdmin', 'true');
                window.location.href = 'accueil.html';
            } else {
                alert('❌ Code incorrect !');
                document.getElementById('codeAdmin').value = '';
            }
        }
        
        function annulerCode() {
            localStorage.setItem('estAdmin', 'false');
            window.location.href = 'accueil.html';
        }
        
        // ============================================
        // 6. INITIALISATION
        // ============================================
        afficherFormulaire();
    </script>
</body>
  </html>
